; ============================================================================
; dallas-site — the SITE node (plant tier for the dallas site).
;
; One container = the site device: the site-wide EMQX bus that the per-line uns-bridges
; uplink into, plus the edge-console, which attaches to that bus on localhost:1883 and
; serves its OWN built UI (no nginx/Vite) on :8443 via component.global.console.ws.webRoot.
;
; START ORDER (priority) + READINESS GATING:
;   10  emqx           site bus (localhost:1883); the bridges from both lines connect here
;   20  edge-console   waits 1883; serves UI + WS /ws + /healthz on :8443
; ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

; Local control socket so `supervisorctl status` works inside the container.
[unix_http_server]
file=/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[program:emqx]
command=/usr/bin/emqx foreground
user=emqx
environment=HOME="/var/lib/emqx",EMQX_ALLOW_ANONYMOUS="true"
priority=10
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:edge-console]
command=/usr/local/bin/wait-for-tcp localhost:1883 -- node /app/edge-console/server/dist/main.js --platform HOST --transport MQTT /config/console-config.json -c FILE /config/console-config.json -t dallas-console
directory=/app/edge-console
priority=20
autorestart=true
startsecs=5
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
