name: config-drift-gate
# The Dallas site's configs/ and supervisor/ are GENERATED from the Deployment Studio fixture
# by the edgecommons deployment renderer, then adopted here. This gate diffs the checked-in files
# against the renderer's committed golden snapshot in edgecommons/edgecommons, so a hand edit to a
# generated file fails the PR. To change these files, change the fixture and re-render (see
# sites/dallas-site/README.md) — never edit them here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-config-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bottling-company-test

      - uses: actions/checkout@v4
        with:
          repository: edgecommons/edgecommons
          token: ${{ secrets.EDGECOMMONS_READ_TOKEN || github.token }}
          path: edgecommons
          sparse-checkout: cli/crates/ec-deploy/tests/fixtures/dallas/golden

      - name: Configs must match the generated golden (no hand edits)
        run: |
          set -uo pipefail
          golden=edgecommons/cli/crates/ec-deploy/tests/fixtures/dallas/golden
          site=bottling-company-test/sites/dallas-site
          # golden per-node dir -> this site's config subdir (and supervisor conf name)
          declare -A map=( [dallas-console]=site [gw-fill-01]=filling-line [gw-pack-01]=packaging-line )
          fail=0
          for node in "${!map[@]}"; do
            sub=${map[$node]}
            for f in "$golden/$node"/*; do
              base=$(basename "$f")
              case "$base" in
                supervisord.conf) target="$site/supervisor/$sub.conf" ;;
                *)                 target="$site/configs/$sub/$base" ;;
              esac
              if ! diff --strip-trailing-cr "$f" "$target"; then
                echo "::error file=$target::drifts from the generated output ($node/$base) — re-render the fixture instead of hand-editing"
                fail=1
              fi
            done
          done
          exit $fail
