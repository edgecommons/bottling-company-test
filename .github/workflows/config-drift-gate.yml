name: config-drift-gate
# The Dallas site's configs/ and supervisor/ are GENERATED by the Deployment Studio kernel
# (edgecommons/deployment-studio, ec-deploy) from fixtures/dallas. This gate re-renders the
# fixture and fails if the checked-in files drift from generated output - a hand edit here is a
# regression; change the fixture and re-render instead (see sites/dallas-site/README.md).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rendered-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bottling-company-test

      - uses: actions/checkout@v4
        with:
          repository: edgecommons/deployment-studio
          token: ${{ secrets.EDGECOMMONS_READ_TOKEN }}
          path: deployment-studio

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: deployment-studio/kernel

      - name: Render the Dallas fixture and require byte-identical configs
        working-directory: deployment-studio/kernel
        run: |
          cargo run --locked --release -q -- oracle \
            ../fixtures/dallas/definition.yaml \
            --environment local \
            --map ../fixtures/dallas/oracle-map.json \
            --harness "${{ github.workspace }}/bottling-company-test/sites/dallas-site" \
            --out /tmp/render \
            --strict
